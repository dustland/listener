name: DialectListener
options:
  bundleIdPrefix: com.dustland
targets:
  DialectListener:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DialectListener
      - path: Shared
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: DialectListener/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dustland.DialectListener
        DEVELOPMENT_TEAM: "" # User can input their Apple Developer Team ID here
        TARGETED_DEVICE_FAMILY: 1
